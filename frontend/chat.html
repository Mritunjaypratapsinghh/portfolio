<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat with Mritunjay — AI Assistant</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .chat-page { flex: 1; display: flex; flex-direction: column; max-width: 800px; width: 100%; margin: 0 auto; padding: 20px; }
    .chat-page-header { text-align: center; padding: 40px 0 20px; }
    .chat-page-header h1 { font-size: 2rem; color: var(--accent); margin-bottom: 8px; }
    .chat-page-header p { color: var(--text-muted); }
    .chat-page-header a { color: var(--accent); text-decoration: none; }
    .chat-container { flex: 1; display: flex; flex-direction: column; background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; min-height: 500px; }
    .chat-container #chat-messages { flex: 1; padding: 24px; gap: 16px; }
    .chat-container .chat-msg { max-width: 70%; font-size: 1rem; padding: 14px 18px; }
    .chat-container #chat-form { padding: 16px 24px; }
    .chat-container #chat-form input { padding: 14px 18px; font-size: 1rem; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
    .suggestions button { background: rgba(100,255,218,0.1); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .suggestions button:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
  <div class="dot-bg"></div>
  
  <div class="chat-page">
    <div class="chat-page-header">
      <h1><i class="fas fa-robot"></i> Chat with Mritunjay</h1>
      <p>Ask me anything about my skills, projects, or experience</p>
      <p><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Portfolio</a></p>
    </div>
    
    <div class="chat-container">
      <div id="chat-messages">
        <div class="chat-msg bot">Hi! I'm Mritunjay's AI assistant. Ask me about my skills, projects, or experience!</div>
      </div>
      <form id="chat-form" onsubmit="sendChat(event)">
        <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
        <button type="submit"><i class="fas fa-paper-plane"></i></button>
      </form>
    </div>
    
    <div class="suggestions">
      <button onclick="askSuggestion(this)">What's your tech stack?</button>
      <button onclick="askSuggestion(this)">Tell me about your projects</button>
      <button onclick="askSuggestion(this)">What's your experience?</button>
      <button onclick="askSuggestion(this)">How can I contact you?</button>
    </div>
  </div>

  <script>
    const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '') 
      ? 'http://localhost:8000' : 'https://your-backend.onrender.com';

    async function sendChat(e) {
      e.preventDefault();
      const input = document.getElementById('chat-input');
      const msg = input.value.trim();
      if (!msg) return;
      
      const messages = document.getElementById('chat-messages');
      messages.innerHTML += `<div class="chat-msg user">${msg}</div>`;
      input.value = '';
      messages.scrollTop = messages.scrollHeight;
      
      messages.innerHTML += `<div class="chat-msg bot typing"><span></span><span></span><span></span></div>`;
      messages.scrollTop = messages.scrollHeight;
      
      try {
        const res = await fetch(`${API_BASE}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg }),
        });
        const data = await res.json();
        messages.querySelector('.typing').remove();
        messages.innerHTML += `<div class="chat-msg bot">${data.reply}</div>`;
      } catch {
        messages.querySelector('.typing').remove();
        messages.innerHTML += `<div class="chat-msg bot">Sorry, I couldn't connect. Is the backend running?</div>`;
      }
      messages.scrollTop = messages.scrollHeight;
    }

    function askSuggestion(btn) {
      document.getElementById('chat-input').value = btn.textContent;
      document.getElementById('chat-form').dispatchEvent(new Event('submit'));
    }
  </script>
</body>
</html>
